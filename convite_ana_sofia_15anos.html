<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite de Aniversário</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding: 50px;
        }
        .invitation {
            background-color: #ffffff;
            border: 2px solid #007BFF;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }
        h1 {
            color: #007BFF;
        }
        p {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="invitation">
        <h1>Você está convidado(a)!</h1>
        <p>Venha celebrar os 15 anos de Ana Sofia!</p>
        <p><strong>Data:</strong> 10 de Março de 2026</p>
        <p><strong>Hora:</strong> 19:46</p>
        <p><strong>Local:</strong> Rua Exemplo, 123, Festa do Centro</p>
        <p>Esperamos você para uma noite mágica!</p>
    </div>
</body>
</html>
